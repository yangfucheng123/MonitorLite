# ============================================
# MonitorLite - 通用运维监控平台
# 开箱即用: java -jar monitor-lite.jar
# ============================================
server.port=${PORT:8090}

# ---- H2 内嵌数据库 (云部署用内存模式, 本地用文件模式) ----
spring.datasource.url=jdbc:h2:${DB_MODE:mem:monitordb};MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- 安全 ----
spring.h2.console.enabled=false

# ---- SQL初始化 ----
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# ---- MonitorLite 自身 ----
monitor.script.dir=./scripts
monitor.interval.system=30
monitor.interval.endpoint=300
monitor.interval.infra=60
monitor.interval.ext-api=120
monitor.interval.k8s=60
monitor.interval.docker=60
monitor.interval.custom=300
monitor.alert.cpu-threshold=85
monitor.alert.mem-threshold=90
monitor.alert.disk-threshold=85
monitor.alert.endpoint-fail-count=3
monitor.clean.keep-days=30
